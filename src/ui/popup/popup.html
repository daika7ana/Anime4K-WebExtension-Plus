<!DOCTYPE html>
<html lang="__MSG_@@ui_locale__">

<head>
  <title data-i18n="extensionName"></title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
  <div class="card">
    <div class="card-header">
      <div class="header-content">
        <div class="header-left">
          <img src="/icons/icon32.svg" alt="Anime4K" class="header-icon">
          <span class="header-title" data-i18n="extensionName">Anime4K</span>
        </div>
        <span id="status-badge" class="status-badge">Ready</span>
      </div>
    </div>

    <div class="card-body">
      <!-- 档位选择器 -->
      <div class="setting-group">
        <label data-i18n="performanceTierLabel">Performance Tier</label>
        <div class="tier-selector">
          <button class="tier-btn" data-tier="performance">
            <span class="tier-icon">🚀</span>
            <span class="tier-label" data-i18n="tierPerformance">Fast</span>
          </button>
          <button class="tier-btn" data-tier="balanced">
            <span class="tier-icon">⚖️</span>
            <span class="tier-label" data-i18n="tierBalanced">Balanced</span>
          </button>
          <button class="tier-btn" data-tier="quality">
            <span class="tier-icon">🎨</span>
            <span class="tier-label" data-i18n="tierQuality">Quality</span>
          </button>
          <button class="tier-btn" data-tier="ultra">
            <span class="tier-icon">🔬</span>
            <span class="tier-label" data-i18n="tierUltra">Ultra</span>
          </button>
        </div>
      </div>

      <!-- 模式选择器 -->
      <div class="setting-group">
        <label id="mode-label" for="mode-select" data-i18n="enhancementModeLabel">Enhancement Mode</label>
        <select id="mode-select" aria-labelledby="mode-label">
          <!-- 模式选项将由 popup.ts 动态填充 -->
        </select>
      </div>

      <!-- 分辨率选择器 -->
      <div class="setting-group">
        <label id="resolution-label" for="resolution-select" data-i18n="resolutionLabel">Resolution</label>
        <select id="resolution-select" aria-labelledby="resolution-label">
          <option value="x2">x2</option>
          <option value="x4">x4</option>
          <option value="x8">x8</option>
          <option value="720p">720p</option>
          <option value="1080p">1080p</option>
          <option value="2k">2K (1440p)</option>
          <option value="4k">4K (2160p)</option>
          <option value="native" data-i18n="nativeResolution">Native</option>
        </select>
      </div>

      <!-- 保存按钮 -->
      <button id="save-settings" class="btn-primary" data-i18n="saveAndApply">Save and apply SR settings</button>

      <!-- 白名单区域 -->
      <div class="whitelist-section">
        <div class="whitelist-toggle">
          <label for="whitelist-toggle" data-i18n="whitelistEnable">Enable Whitelist</label>
          <label class="switch">
            <input type="checkbox" id="whitelist-toggle">
            <span class="slider"></span>
          </label>
        </div>

        <div class="whitelist-buttons">
          <button id="add-current-page" title="Add current page to whitelist">
            <span class="btn-icon">📄</span>
            <span data-i18n="addCurrentPage">Page</span>
          </button>
          <button id="add-current-domain" title="Add current domain to whitelist">
            <span class="btn-icon">🌐</span>
            <span data-i18n="addCurrentDomain">Domain</span>
          </button>
          <button id="add-parent-path" title="Add parent path to whitelist">
            <span class="btn-icon">📁</span>
            <span data-i18n="addParentPath">Path</span>
          </button>
        </div>
      </div>

      <button id="open-settings" data-i18n="openSettings">Settings</button>
    </div>
  </div>

  <footer id="extension-footer">
    <a href="https://github.com/chenmozhijin/Anime4K-WebExtension" target="_blank" rel="noopener">Anime4K
      WebExtension</a>
    <span> • </span>
    <span id="version-info"></span>
  </footer>

</body>

</html>
